# Claude emulator profile for e2e testing — uses testcli binary
name: claude
binary: testcli
display_name: "Claude (emulated)"

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: true
  json: true
  jsonl: true
  stdin_pipe: true

output_format: jsonl

command:
  base: "testcli claude --output-format stream-json"

prompt_flag: "-p"
prompt_flag_type: short
default_model: "claude-sonnet-4-6"
model_flag: "--model"
timeout_seconds: 10
stdin_threshold: 6000
completion_pattern: '"type":"result"'
