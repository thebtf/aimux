# Gemini emulator profile for e2e testing — uses testcli binary
name: gemini
binary: testcli
display_name: "Gemini (emulated)"

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: true
  stdin_pipe: false

output_format: jsonl

command:
  base: "testcli gemini --output-format stream-json"

prompt_flag: "-p"
prompt_flag_type: short
default_model: "gemini-2.5-pro"
model_flag: "-m"
timeout_seconds: 10
stdin_threshold: 0
completion_pattern: '"type":"result"'
