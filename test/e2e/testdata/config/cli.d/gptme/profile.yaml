# Gptme emulator profile for e2e testing
name: gptme
binary: testcli
display_name: "Gptme (emulated)"
features:
  streaming: false
  headless: true
  read_only: false
  session_resume: false
  json: false
  jsonl: false
  stdin_pipe: true
output_format: text
command:
  base: "testcli gptme --non-interactive"
prompt_flag: "-n"
prompt_flag_type: short
default_model: "gpt-4.1"
model_flag: "--model"
timeout_seconds: 10
stdin_threshold: 0
