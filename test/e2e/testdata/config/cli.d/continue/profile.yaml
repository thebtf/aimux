# Continue emulator profile for e2e testing
name: continue
binary: testcli
display_name: "Continue (emulated)"
features:
  streaming: false
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true
output_format: text
command:
  base: "testcli continue"
prompt_flag: "-p"
prompt_flag_type: short
default_model: "claude-sonnet-4-6"
model_flag: "--model"
timeout_seconds: 10
stdin_threshold: 0
