# E2E test config — uses echo as mock CLI
server:
  log_level: error
  log_file: /dev/null
  max_concurrent_jobs: 5
  default_timeout_seconds: 10
  max_prompt_bytes: 1048576
  audit:
    scanner_role: default
    validator_role: default
    parallel_scanners: 1
  pair:
    max_rounds: 1
  consensus:
    max_turns: 2
  debate:
    max_turns: 2

roles:
  default:
    cli: echo-cli
  coding:
    cli: echo-cli
  codereview:
    cli: echo-cli
  thinkdeep:
    cli: echo-cli

circuit_breaker:
  failure_threshold: 3
  cooldown_seconds: 5
  half_open_max_calls: 1
