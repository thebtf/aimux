name: loomlint

on:
  pull_request:
    paths:
      - 'pkg/loom/**'
      - 'loom/**'
      - 'tools/loomlint/**'

jobs:
  loomlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Lint pkg/loom (Phase 0-3 boundary check)
        run: go run ./tools/loomlint ./pkg/loom

      - name: Lint loom/ (Phase 4+ boundary check)
        run: |
          if test -d loom; then
            go run ./tools/loomlint ./loom
          fi
