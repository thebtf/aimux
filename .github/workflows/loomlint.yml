name: loomlint

on:
  pull_request:
    paths:
      - 'loom/**'
      - 'pkg/aimuxworkers/**'
      - 'tools/loomlint/**'

jobs:
  loomlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test loomlint
        run: go test ./tools/loomlint -count=1

      - name: Vet loomlint
        run: go vet ./tools/loomlint

      - name: Lint loom/ (nested module boundary check)
        run: go run ./tools/loomlint --skip-dir examples ./loom
