name: Mutation Testing

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 3am UTC
  workflow_dispatch:  # Manual trigger

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
        continue-on-error: true

      - name: Run mutation testing
        run: |
          if command -v gremlins &> /dev/null; then
            gremlins unleash --threshold-efficacy=75 ./pkg/... || true
          else
            echo "Gremlins not available for Go 1.25 — skipping mutation testing"
          fi
        continue-on-error: true  # informational until Go 1.25 support confirmed
