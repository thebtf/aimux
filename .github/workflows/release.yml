name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.3.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'

      - name: Build
        run: go build ./...

      - name: Unit and integration tests
        run: go test ./... -count=1 -timeout 300s

      - name: Critical suite
        run: go test ./tests/critical -count=1 -timeout 300s

      # CodeEntry is intentionally excluded: it requires real vendor CLIs and stays outside the deterministic tag gate.
      - name: AIMUX-21 deterministic product gate
        env:
          AIMUX21_E2E: "1"
        run: |
          set -euo pipefail
          matched_tests="$(go test ./test/e2e -list 'TestE2E_(AIMUX21|ReviewEntry|TaskRouter|Resume)')"
          printf '%s\n' "$matched_tests"
          grep -q '^TestE2E_' <<< "$matched_tests"
          go test ./test/e2e -run 'TestE2E_(AIMUX21|ReviewEntry|TaskRouter|Resume)' -count=1 -timeout 600s

      - name: Loom module tests
        working-directory: loom
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Module verification
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}

      - name: Vulnerability scan
        run: $(go env GOPATH)/bin/govulncheck ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
