name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.3.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.10'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install AIMUX-21 real CLI dependencies
        run: npm install -g @openai/codex @anthropic-ai/claude-code

      - name: Build
        run: go build ./...

      - name: Unit and integration tests
        run: go test ./... -count=1 -timeout 300s

      - name: Critical suite
        run: go test ./tests/critical -count=1 -timeout 300s

      - name: AIMUX-21 product gate
        env:
          AIMUX21_E2E: "1"
          AIMUX21_REQUIRE_REAL_CLIS: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is required for AIMUX-21 real Codex release gate"
            exit 1
          fi
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is required for AIMUX-21 real Claude release gate"
            exit 1
          fi
          codex --version
          claude --version
          go test ./test/e2e -run 'TestE2E_(AIMUX21|CodeEntry|ReviewEntry|TaskRouter|Resume)' -count=1 -timeout 600s

      - name: Loom module tests
        working-directory: loom
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Module verification
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}

      - name: Vulnerability scan
        run: $(go env GOPATH)/bin/govulncheck ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
