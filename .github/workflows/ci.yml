name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector (Unix)
        if: runner.os != 'Windows'
        run: go test -race -coverprofile coverage.out -timeout 5m ./...

      - name: Test without race detector (Windows)
        if: runner.os == 'Windows'
        run: go test -timeout 5m ./...

      # AIMUX-16 CR-004 NFR-5 — ConPTY-specific verification on Windows.
      # Runs the conpty package tests verbosely and asserts that the real
      # CreatePseudoConsole path was exercised (TestProbeConPTY_RealHostSucceeds
      # AND TestOpenWindowsConPTY_SpawnsRealPseudoConsole both PASS, neither
      # SKIP). Skipping on Windows is PROHIBITED per spec — silent skip would
      # re-introduce the deferral pattern CR-004 was filed to fix.
      - name: ConPTY Windows verification (AIMUX-16 CR-004 NFR-5)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          out=$(go test ./pkg/executor/conpty/... -timeout 2m -v -run 'TestProbeConPTY_RealHostSucceeds|TestOpenWindowsConPTY_SpawnsRealPseudoConsole|TestExecutor_Run_ProducesOutput' 2>&1)
          echo "$out"
          # Both happy-path tests MUST pass; neither may skip on a real Windows runner.
          for tc in TestProbeConPTY_RealHostSucceeds TestOpenWindowsConPTY_SpawnsRealPseudoConsole TestExecutor_Run_ProducesOutput; do
            if ! echo "$out" | grep -q "^--- PASS: $tc"; then
              echo "::error::AIMUX-16 CR-004 NFR-5 violated: $tc did not PASS on windows-latest" >&2
              exit 1
            fi
            if echo "$out" | grep -q "^--- SKIP: $tc"; then
              echo "::error::AIMUX-16 CR-004 NFR-5 violated: $tc SKIPPED on windows-latest" >&2
              exit 1
            fi
          done

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
        continue-on-error: true  # golangci-lint v2.1.6 built with Go 1.24, go.mod targets 1.25

  loom-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build loom examples
        working-directory: loom
        run: go build ./examples/...

  stub-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub grep scanner (Constitution P17)
        run: bash scripts/stub-grep.sh .
        continue-on-error: true  # informational until v3 stubs are fixed

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Dead code analysis
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./... 2>&1 | grep -v "_test.go" | head -20 || true
        continue-on-error: true
