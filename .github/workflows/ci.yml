name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector (Unix)
        if: runner.os != 'Windows'
        run: go test -race -coverprofile coverage.out -timeout 5m ./...

      - name: Test without race detector (Windows)
        if: runner.os == 'Windows'
        run: go test -timeout 5m ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
        continue-on-error: true  # golangci-lint v2.1.6 built with Go 1.24, go.mod targets 1.25

  loom-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build loom examples
        working-directory: loom
        run: go build ./examples/...

  stub-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub grep scanner (Constitution P17)
        run: bash scripts/stub-grep.sh .
        continue-on-error: true  # informational until v3 stubs are fixed

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Dead code analysis
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./... 2>&1 | grep -v "_test.go" | head -20 || true
        continue-on-error: true
