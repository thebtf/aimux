# OpenCode CLI profile
name: opencode
binary: opencode
display_name: "OpenCode"
capabilities: [coding, analysis]

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# OpenCode requires "run" subcommand for non-interactive mode.
# Prompt is positional: opencode run --format json "message"
# WARNING: -p in opencode means --password, NOT prompt!
command:
  base: "opencode run"

# Prompt is positional (last argument).
prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

reasoning:
  flag: "--variant"
  levels: [minimal, low, medium, high, max]

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: []

headless_flags: ["--format", "json"]

env_passthrough:
  - OPENAI_API_KEY
  - ANTHROPIC_API_KEY
  - GEMINI_API_KEY
