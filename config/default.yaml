# aimux v3 — Default Server Configuration
# Override per-project via {cwd}/.aimux/config.yaml
# Override per-setting via AIMUX_* environment variables

server:
  log_level: info
  log_file: ~/.config/aimux/aimux.log
  db_path: ~/.config/aimux/sessions.db
  max_concurrent_jobs: 10
  session_ttl_hours: 24
  gc_interval_seconds: 300
  progress_interval_seconds: 15
  streaming_grace_seconds: 60
  streaming_soft_warning_seconds: 120
  streaming_hard_stall_seconds: 600
  streaming_auto_cancel_seconds: 900
  default_async: false
  default_timeout_seconds: 300

  # cli_priority: tiebreak order when multiple CLIs can serve a role.
  # CLIs absent from this list are appended after in stable load order.
  cli_priority: [codex, claude, gemini, qwen, opencode, goose, crush, gptme, cline, aider, droid, cn]

  # warmup_enabled: set AIMUX_WARMUP=false to skip all probes (binary-only detection).
  warmup_enabled: true
  warmup_timeout_seconds: 15

  # Log rotation (lumberjack, engram#176). Log grew to 146 GB with no rotation.
  # log_max_size_mb:  rotate the active log file once it reaches this size (megabytes).
  # log_max_backups:  maximum number of rotated backup files to keep (oldest deleted first).
  # log_max_age_days: delete backup files older than this many days (0 = keep forever).
  # log_compress:     gzip-compress rotated backups to reduce disk usage.
  # log_max_line_bytes: truncate any single log line that exceeds this byte length and
  #                     append "...[truncated NNN bytes]" — guards against 200 KB+ payload dumps.
  log_max_size_mb: 100
  log_max_backups: 5
  log_max_age_days: 14
  log_compress: true
  log_max_line_bytes: 4096

  # Centralized logging (AIMUX-11): shim-side IPC forward buffer and send timeout.
  # log_forward_buffer_size: ring buffer capacity for the shim IPCSink. Oldest entry
  #   is dropped on overflow. Default: 100.
  # log_forward_timeout_ms: per-entry send timeout (ms) before routing to StderrFallback.
  #   Default: 100.
  log_forward_buffer_size: 100
  log_forward_timeout_ms: 100

  # Two-phase daemon init (issue #129): Phase A listens immediately via a lightweight stub;
  # Phase B swaps in the full delegate once the daemon is ready.
  # warmup_grace_seconds: max seconds HandleRequest callers block in Phase A before
  # receiving a JSON-RPC -32001 retry hint (default 15s).
  # async_init: true (default) swaps the delegate in a background goroutine so the
  # engine starts accepting connections immediately. Set to false for synchronous init
  # (useful in tests or single-process environments).
  warmup_grace_seconds: 15
  async_init: true

  # Audit pipeline configuration
  audit:
    scanner_role: codereview
    validator_role: analyze
    default_mode: standard
    parallel_scanners: 3
    scanner_timeout_seconds: 600
    validator_timeout_seconds: 300

  # Pair coding configuration
  pair:
    driver_role: coding
    reviewer_role: codereview
    max_rounds: 3
    driver_timeout_seconds: 300
    reviewer_timeout_seconds: 180

  # Consensus configuration
  consensus:
    default_blinded: true
    default_synthesize: false
    max_turns: 8
    timeout_per_turn_seconds: 180

  # Debate configuration
  debate:
    default_synthesize: true
    max_turns: 6
    timeout_per_turn_seconds: 180

  # Research configuration
  research:
    default_synthesize: true
    timeout_per_participant_seconds: 300

  # Think configuration
  think:
    auto_consensus_threshold: 60
    default_dialog_max_turns: 4

# Role → CLI preferences (overridden by AIMUX_ROLE_* env)
# Reasoning effort tiers: low (trivial) → medium (standard) → high (analytical) → xhigh (deep)
roles:
  # Trivial: template-based, linting, documentation
  docgen:
    cli: codex
    reasoning_effort: low
  tracer:
    cli: codex
    reasoning_effort: low
  precommit:
    cli: codex
    reasoning_effort: low

  # Standard: implementation, refactoring, test generation
  coding:
    cli: codex
    model: gpt-5.4
    reasoning_effort: medium
  refactor:
    cli: codex
    reasoning_effort: medium
  testgen:
    cli: codex
    reasoning_effort: medium
  default:
    cli: codex
    reasoning_effort: medium

  # Analytical: review, analysis, debugging — need pattern recognition
  codereview:
    cli: codex
    model: gpt-5.4
    reasoning_effort: high
  analyze:
    cli: gemini
  debug:
    cli: codex
    reasoning_effort: high

  # Deep: architecture, security, adversarial — maximum reasoning
  thinkdeep:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  secaudit:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  planner:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  challenge:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh

# Circuit breaker settings
circuit_breaker:
  failure_threshold: 3
  cooldown_seconds: 300
  half_open_max_calls: 1

# CLI driver layer settings (AIMUX-16 CR-003 + CR-006).
# discovery_cache_ttl_seconds: how long a successful binary discovery result
#   stays cached before the registry re-runs the 4-level scan. A binary mtime
#   change short-circuits the TTL — the cache invalidates immediately on any
#   file change. Default 86400 (24h).
# capability_cache_ttl_seconds: how long a verified per-(cli, role) probe
#   result stays fresh before the background refresher re-probes. Default 3600s (1h).
# capability_probe_timeout_seconds: per-probe wall-clock budget. Zero falls back
#   to server.warmup_timeout_seconds. Inline cache-miss probes use this directly.
driver:
  discovery_cache_ttl_seconds: 86400
  capability_cache_ttl_seconds: 3600
  capability_probe_timeout_seconds: 5
