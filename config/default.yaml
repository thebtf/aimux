# aimux v3 — Default Server Configuration
# Override per-project via {cwd}/.aimux/config.yaml
# Override per-setting via AIMUX_* environment variables

server:
  log_level: info
  log_file: ~/.config/aimux/aimux.log
  db_path: ~/.config/aimux/sessions.db
  max_concurrent_jobs: 10
  session_ttl_hours: 24
  gc_interval_seconds: 300
  progress_interval_seconds: 15
  streaming_grace_seconds: 60
  streaming_soft_warning_seconds: 120
  streaming_hard_stall_seconds: 600
  streaming_auto_cancel_seconds: 900
  default_async: false
  default_timeout_seconds: 300

  # cli_priority: tiebreak order when multiple CLIs can serve a role.
  # CLIs absent from this list are appended after in stable load order.
  cli_priority: [codex, claude, gemini, qwen, opencode, goose, crush, gptme, cline, aider, droid, cn]

  # warmup_enabled: set AIMUX_WARMUP=false to skip all probes (binary-only detection).
  warmup_enabled: true
  warmup_timeout_seconds: 15

  # Audit pipeline configuration
  audit:
    scanner_role: codereview
    validator_role: analyze
    default_mode: standard
    parallel_scanners: 3
    scanner_timeout_seconds: 600
    validator_timeout_seconds: 300

  # Pair coding configuration
  pair:
    driver_role: coding
    reviewer_role: codereview
    max_rounds: 3
    driver_timeout_seconds: 300
    reviewer_timeout_seconds: 180

  # Consensus configuration
  consensus:
    default_blinded: true
    default_synthesize: false
    max_turns: 8
    timeout_per_turn_seconds: 180

  # Debate configuration
  debate:
    default_synthesize: true
    max_turns: 6
    timeout_per_turn_seconds: 180

  # Research configuration
  research:
    default_synthesize: true
    timeout_per_participant_seconds: 300

  # Think configuration
  think:
    auto_consensus_threshold: 60
    default_dialog_max_turns: 4

# Role → CLI preferences (overridden by AIMUX_ROLE_* env)
# Reasoning effort tiers: low (trivial) → medium (standard) → high (analytical) → xhigh (deep)
roles:
  # Trivial: template-based, linting, documentation
  docgen:
    cli: codex
    reasoning_effort: low
  tracer:
    cli: codex
    reasoning_effort: low
  precommit:
    cli: codex
    reasoning_effort: low

  # Standard: implementation, refactoring, test generation
  coding:
    cli: codex
    model: gpt-5.3-codex
    reasoning_effort: medium
  refactor:
    cli: codex
    reasoning_effort: medium
  testgen:
    cli: codex
    reasoning_effort: medium
  default:
    cli: codex
    reasoning_effort: medium

  # Analytical: review, analysis, debugging — need pattern recognition
  codereview:
    cli: codex
    model: gpt-5.4
    reasoning_effort: high
  analyze:
    cli: gemini
  debug:
    cli: codex
    reasoning_effort: high

  # Deep: architecture, security, adversarial — maximum reasoning
  thinkdeep:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  secaudit:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  planner:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh
  challenge:
    cli: codex
    model: gpt-5.4
    reasoning_effort: xhigh

# Circuit breaker settings
circuit_breaker:
  failure_threshold: 3
  cooldown_seconds: 300
  half_open_max_calls: 1
