# Continue CLI profile (binary: cn)
name: continue
binary: cn
display_name: "Continue"
capabilities: [coding, review, analysis]

features:
  streaming: false
  headless: true
  read_only: true
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# Continue uses default command. Prompt is positional.
# -p/--print enables headless mode (like claude).
command:
  base: "cn"

prompt_flag: ""
prompt_flag_type: "positional"

# model_format: --model expects a hub slug (owner/package), NOT a bare model name.
# Example: --model anthropic/claude-sonnet-4-5 (CORRECT)
#          --model claude-sonnet-4-5            (WRONG — will fail silently)
# The hub slug format is owner/package as listed on the Continue hub registry.
# Bare model names (claude-sonnet-4-5, gpt-4o, etc.) are silently ignored by cn.
default_model: ""
model_flag: "--model"

# stdin_sentinel: cn does not read from stdin; no sentinel needed.
stdin_sentinel: ""

# model_fallback: Continue manages its own model selection via hub slugs; no explicit fallback list.
model_fallback: []

# cooldown_seconds: back-off duration for rate-limited models.
cooldown_seconds: 60

# completion_pattern: cn emits a completion marker when done.
completion_pattern: "completed|done"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 20

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--readonly"]

# -p enables print/headless mode, --format json for structured output
headless_flags: ["-p", "--format", "json"]

env_passthrough:
  - OPENAI_API_KEY
  - ANTHROPIC_API_KEY
  - GEMINI_API_KEY
