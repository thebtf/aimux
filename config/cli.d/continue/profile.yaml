# Continue CLI profile (binary: cn)
name: continue
binary: cn
display_name: "Continue"
capabilities: [coding, review, analysis]

features:
  streaming: false
  headless: true
  read_only: true
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# Continue uses default command. Prompt is positional.
# -p/--print enables headless mode (like claude).
command:
  base: "cn"

prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--readonly"]

# -p enables print/headless mode, --format json for structured output
headless_flags: ["-p", "--format", "json"]
