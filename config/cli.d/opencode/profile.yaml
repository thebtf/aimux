# OpenCode CLI profile
name: opencode
binary: opencode
display_name: "OpenCode"

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

command:
  base: "opencode"
  args_template: >-
    {{if .Model}}--model {{.Model}}{{end}}
    {{if .ReasoningEffort}}--variant {{.ReasoningEffort}}{{end}}
    --output-format json
    -p "{{.Prompt}}"

prompt_flag: "-p"
prompt_flag_type: "short"

default_model: ""
model_flag: "--model"

reasoning:
  flag: "--variant"
  levels: [minimal, low, medium, high, max]

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: []
