# Cline CLI profile
name: cline
binary: cline
display_name: "Cline"
capabilities: [coding, review]

features:
  streaming: false
  headless: true
  read_only: true
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: text

# Cline requires "task" subcommand. Prompt is positional (<prompt>).
command:
  base: "cline task"

prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

reasoning:
  flag: "--reasoning-effort"
  levels: [none, low, medium, high, xhigh]

# stdin_sentinel: cline does not read from stdin; no sentinel needed.
stdin_sentinel: ""

# model_fallback: cline manages its own model selection internally; no explicit fallback list.
model_fallback: []

# cooldown_seconds: back-off duration for rate-limited models.
cooldown_seconds: 60

# completion_pattern: cline emits a task summary line when done.
completion_pattern: "Task completed|task complete"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 15

timeout_seconds: 600

stdin_threshold: 6000

# --plan/-p for read-only mode
read_only_flags: ["--plan"]

# --act for auto-approve (headless)
headless_flags: ["--act", "--json"]

env_passthrough:
  - ANTHROPIC_API_KEY
  - OPENAI_API_KEY
