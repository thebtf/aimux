# Qwen CLI profile
name: qwen
binary: qwen
display_name: "Qwen (Alibaba)"
capabilities: [coding, review, analysis]

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

command:
  base: "qwen"
  args_template: >-
    {{if .Model}}--model {{.Model}}{{end}}
    --output-format json
    -p "{{.Prompt}}"

prompt_flag: "-p"
prompt_flag_type: "short"

default_model: ""
model_flag: "--model"

# stdin_sentinel: qwen does not read from stdin; no sentinel needed.
stdin_sentinel: ""

# model_fallback: qwen manages its own model selection internally; no explicit fallback list.
model_fallback: []

# cooldown_seconds: back-off duration for rate-limited models.
cooldown_seconds: 60

# completion_pattern: qwen JSON output contains a completion marker.
completion_pattern: "completed|done|finished"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 10

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--approval-mode", "plan"]

env_passthrough:
  - DASHSCOPE_API_KEY
