# Codex CLI profile — primary coding agent
name: codex
binary: codex
display_name: "Codex (OpenAI)"
capabilities: [coding, review, analysis, debugging, planning]

features:
  streaming: true
  headless: true
  read_only: true
  session_resume: true
  json: false
  jsonl: true
  stdin_pipe: true

output_format: jsonl

# Command: "codex exec" for non-interactive mode (not bare "codex" which starts TUI)
command:
  base: "codex exec"
  args_template: >-
    {{if .Headless}}--full-auto{{end}}
    {{if .ReadOnly}}--sandbox read-only{{end}}
    {{if .Model}}-m {{.Model}}{{end}}
    {{if .ReasoningEffort}}-c model_reasoning_effort="{{.ReasoningEffort}}"{{end}}
    {{if .SessionResume}}resume {{.SessionID}}{{end}}
    "{{.Prompt}}"

# Codex uses positional prompt (last argument), NOT -p flag
# (-p in codex means config profile selector, not prompt)
prompt_flag: ""
prompt_flag_type: "positional"

# Default model: codex CLI does NOT handle spark/base fallback internally.
# Without -m, codex picks spark by default and fails on 429 with no retry.
# Set explicit model so our suffix-strip fallback can detect and strip "-spark".
#
# account_gating: -spark models require a ChatGPT subscription; they are NOT available
# via a bare OPENAI_API_KEY on the standard API plan. Use OPENAI_API_KEY with the
# standard API plan and the -codex (non-spark) model for API-key-only access.
#
# version note: bump '5.3' when OpenAI releases a new Codex version; verify the new
# version string via `codex --version` or the OpenAI changelog before updating.
default_model: "gpt-5.3-codex-spark"

# Model flag
model_flag: "-m"

# Reasoning effort via config
reasoning:
  flag: "-c"
  flag_value_template: 'model_reasoning_effort={{.Level}}'
  levels: [low, medium, high, xhigh]

# Model fallback — on quota error (rate limit), try next model before switching CLI.
# fallback_suffix_strip: dynamically strip these suffixes to generate fallback models.
# E.g., "-spark" means gpt-X-codex-spark → gpt-X-codex (survives version upgrades).
# model_fallback: explicit list (applied before suffix strip). Empty = suffix strip only.
model_fallback: []
fallback_suffix_strip:
  - "-spark"

# Cooldown duration (seconds) for rate-limited models.
# Spark has weekly limits that can be exhausted for days — short cooldowns
# just waste requests. 86400s (24h) means one probe per day.
# The base model (-codex without -spark) is always available.
cooldown_seconds: 86400

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 8

# Timeout defaults
timeout_seconds: 3600

# Stdin piping threshold (chars)
stdin_threshold: 6000

# Codex exec requires "-" as a positional arg to read prompt from stdin.
# Without it, codex exec ignores stdin and exits with error code 2.
stdin_sentinel: "-"

# Completion pattern for early termination
completion_pattern: "turn\\.completed"

# Read-only flags
read_only_flags: ["--sandbox", "read-only"]

# Headless mode flags (appended when features.headless is true)
headless_flags: ["--full-auto", "--json"]

env_passthrough:
  - OPENAI_API_KEY
