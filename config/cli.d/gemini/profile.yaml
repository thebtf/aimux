# Gemini CLI profile
name: gemini
binary: gemini
display_name: "Gemini (Google)"
capabilities: [analysis, review, research, debugging]

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

command:
  base: "gemini"
  args_template: >-
    {{if .Model}}--model {{.Model}}{{end}}
    --output-format json
    -p "{{.Prompt}}"

prompt_flag: "-p"
prompt_flag_type: "short"

default_model: ""
model_flag: "--model"

# stdin_sentinel: gemini does not read from stdin; no sentinel needed.
stdin_sentinel: ""

# model_fallback: Gemini CLI manages quota internally; no explicit fallback list.
# Add entries here if quota exhaustion becomes a recurring issue.
model_fallback: []

# Cooldown duration (seconds) for rate-limited models.
# Gemini CLI manages quota internally; 3600s (1h) prevents rapid retry on API errors.
cooldown_seconds: 3600

# Completion pattern for early termination.
# Gemini CLI JSON output does not emit a structured completion token, so we match
# common terminal-state words in any output line.
completion_pattern: "completed|done|finished"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 10

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--approval-mode", "plan"]

headless_flags: ["-y"]

env_passthrough:
  - GEMINI_API_KEY
  - GOOGLE_API_KEY
