# Gemini CLI profile
name: gemini
binary: gemini
display_name: "Gemini (Google)"
capabilities: [analysis, review, research, debugging]

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

command:
  base: "gemini"
  args_template: >-
    {{if .Model}}--model {{.Model}}{{end}}
    --output-format json
    -p "{{.Prompt}}"

prompt_flag: "-p"
prompt_flag_type: "short"

default_model: ""
model_flag: "--model"

# model_fallback: omitted intentionally — Gemini CLI defaults to its own model selection
# and manages quota internally. Fallback to alternative Gemini models is not currently
# configured. Add model_fallback if quota exhaustion becomes a recurring issue.

# Cooldown duration (seconds) for rate-limited models.
# Gemini CLI manages quota internally; 3600s (1h) prevents rapid retry on API errors.
cooldown_seconds: 3600

# Completion pattern for early termination.
# Gemini CLI JSON output does not emit a structured completion token, so we match
# common terminal-state words in any output line.
completion_pattern: "completed|done|finished"

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--approval-mode", "plan"]

headless_flags: ["-y"]

env_passthrough:
  - GEMINI_API_KEY
  - GOOGLE_API_KEY
