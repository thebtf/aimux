# Aider CLI profile
name: aider
binary: aider
display_name: "Aider"
capabilities: [coding]

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: false
  json: false
  jsonl: false
  stdin_pipe: false

output_format: text

command:
  base: "aider"
  args_template: >-
    --no-auto-commits
    --no-dirty-commits
    --no-auto-test
    --no-auto-lint
    {{if .Model}}--model {{.Model}}{{end}}
    --message "{{.Prompt}}"

prompt_flag: "--message"
prompt_flag_type: "long"

default_model: ""
model_flag: "--model"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 20

timeout_seconds: 600

stdin_threshold: 0

read_only_flags: []

env_passthrough:
  - OPENAI_API_KEY
  - ANTHROPIC_API_KEY
  - GEMINI_API_KEY
  - GROQ_API_KEY
  - AZURE_OPENAI_API_KEY
