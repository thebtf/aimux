# Droid CLI profile
name: droid
binary: droid
display_name: "Droid"

features:
  streaming: true
  headless: true
  read_only: true
  session_resume: false
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# Droid requires "exec" subcommand for non-interactive mode.
# Prompt is positional: droid exec --output-format json "prompt"
command:
  base: "droid exec"

# Prompt is positional (last argument). There is NO -p flag.
prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

reasoning:
  flag: "-r"
  levels: [none, low, medium, high, xhigh]

timeout_seconds: 600

stdin_threshold: 6000

# Default mode is read-only (no flag needed). --auto enables writes.
read_only_flags: []

headless_flags: ["--output-format", "json"]
