# Claude CLI profile
name: claude
binary: claude
display_name: "Claude (Anthropic)"
capabilities: [coding, review, analysis, debugging, planning, research]

features:
  streaming: true
  headless: true
  read_only: true
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# Claude uses -p/--print as headless mode flag (NOT prompt).
# Prompt is a positional argument: claude -p --output-format json "prompt"
command:
  base: "claude"

# Prompt is positional (last argument). -p means "print mode" (headless), NOT prompt.
prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

# Reasoning effort: --effort [low|medium|high|max]
reasoning:
  flag: "--effort"
  levels: [low, medium, high, max]

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 8

timeout_seconds: 600

stdin_threshold: 6000

# Read-only via permission-mode plan
read_only_flags: ["--permission-mode", "plan"]

# Headless mode: -p/--print enables non-interactive output
headless_flags: ["-p", "--output-format", "json"]

env_passthrough:
  - ANTHROPIC_API_KEY
  - CLAUDE_API_KEY
