# Claude CLI profile
name: claude
binary: claude
display_name: "Claude (Anthropic)"

features:
  streaming: true
  headless: true
  read_only: false
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

command:
  base: "claude"
  args_template: >-
    {{if .Model}}--model {{.Model}}{{end}}
    {{if .SessionResume}}--continue {{.SessionID}}{{end}}
    --output-format json
    -p "{{.Prompt}}"

prompt_flag: "-p"
prompt_flag_type: "short"

default_model: ""
model_flag: "--model"

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: ["--disallowedTools"]
