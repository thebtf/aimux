# Claude CLI profile
name: claude
binary: claude
display_name: "Claude (Anthropic)"
capabilities: [coding, review, analysis, debugging, planning, research]

features:
  streaming: true
  headless: true
  read_only: true
  session_resume: true
  json: true
  jsonl: false
  stdin_pipe: true

output_format: json

# Claude uses -p/--print as headless mode flag (NOT prompt).
# Prompt is a positional argument: claude -p --output-format json "prompt"
command:
  base: "claude"

# Prompt is positional (last argument). -p means "print mode" (headless), NOT prompt.
prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

# Reasoning effort: --effort [low|medium|high|max]
reasoning:
  flag: "--effort"
  levels: [low, medium, high, max]

# Model fallback — on quota error (rate limit), try next model before switching CLI.
# Real Anthropic model IDs verified against platform.claude.com/docs/en/about-claude/models/overview
# at audit time (2026-04-30). Order: Opus 4.7 (flagship) → Sonnet 4.6 (scale) → Haiku 4.5 (low-latency fallback).
model_fallback:
  - claude-opus-4-7
  - claude-sonnet-4-6
  - claude-haiku-4-5-20251001

# Cooldown duration (seconds) for rate-limited models.
# 3600s (1h) aligns with Anthropic public quota refresh cadence and matches
# the gemini precedent. Codex uses 86400s due to weekly spark limits — claude
# does not have an equivalent suffix-class with multi-day exhaustion windows,
# so 1h provides faster recovery without wasting requests on a still-rate-limited tier.
cooldown_seconds: 3600

# Completion pattern for early termination.
# Matches the canonical claude streaming-end marker emitted on a single line.
# Pattern source: pkg/executor/session/session_completion_test.go (claudeCorpus
# canonical sentinel). Anchored regex prevents substring matches in mid-stream
# tags like <message>, <token>, <tool_use>, <tool_result>.
completion_pattern: "^---END---$"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 8

timeout_seconds: 600

stdin_threshold: 6000

# Read-only via permission-mode plan
read_only_flags: ["--permission-mode", "plan"]

# Headless mode: -p/--print enables non-interactive output
headless_flags: ["-p", "--output-format", "json"]

env_passthrough:
  - ANTHROPIC_API_KEY
  - CLAUDE_API_KEY
