# Crush CLI profile
name: crush
binary: crush
display_name: "Crush"
capabilities: [coding, analysis]

features:
  streaming: false
  headless: true
  read_only: false
  session_resume: true
  json: false
  jsonl: false
  stdin_pipe: true

output_format: text

# Crush requires "run" subcommand. Prompt is positional.
command:
  base: "crush run"

prompt_flag: ""
prompt_flag_type: "positional"

default_model: ""
model_flag: "--model"

# warmup_timeout_seconds: covers CLI cold-start + prompt→response; adjust if false-negatives accumulate
warmup_timeout_seconds: 15

timeout_seconds: 600

stdin_threshold: 6000

read_only_flags: []

env_passthrough:
  - ANTHROPIC_API_KEY
  - OPENAI_API_KEY
