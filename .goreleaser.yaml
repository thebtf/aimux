version: 2

builds:
  - binary: aimux
    main: ./cmd/aimux/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/thebtf/aimux/pkg/build.Version={{.Version}}
      - -X github.com/thebtf/aimux/pkg/build.Commit={{.ShortCommit}}
      - -X github.com/thebtf/aimux/pkg/build.BuildDate={{.Date}}

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
